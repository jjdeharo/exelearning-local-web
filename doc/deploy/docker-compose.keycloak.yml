# eXeLearning deployment with MariaDB and Keycloak (OIDC)
# Based on doc/deploy configurations and authentication docs.

services:
  exelearning:
    image: ghcr.io/exelearning/exelearning:${TAG:-latest}
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      - exelearning-db
      - keycloak
    volumes:
      - exelearning-data:/mnt/data:rw
    environment:
      APP_ENV: prod
      APP_DEBUG: 0
      APP_SECRET: "${APP_SECRET:-ChangeThisSecretForINTEF}"
      APP_PORT: "${APP_PORT:-8080}"
      APP_ONLINE_MODE: 1
      XDEBUG_MODE: off

      DB_DRIVER: pdo_mysql
      DB_HOST: exelearning-db
      DB_PORT: 3306
      DB_NAME: "${DB_NAME:-exelearning}"
      DB_USER: "${DB_USER:-exelearning}"
      DB_PASSWORD: "${DB_PASSWORD:-exelearning}"
      DB_CHARSET: "${DB_CHARSET:-utf8mb4}"
      DB_SERVER_VERSION: 10.6

      FILES_DIR: "/mnt/data/"

      APP_AUTH_METHODS: "password,openid"
      AUTH_CREATE_USERS: true
      # Attention!! OIDC_ISSUER url must end with "/"
      OIDC_ISSUER: "${OIDC_ISSUER:-http://keycloak:8081/realms/exelearning/}"
      OIDC_AUTHORIZATION_ENDPOINT: "${OIDC_AUTHORIZATION_ENDPOINT:-http://keycloak:8081/realms/exelearning/protocol/openid-connect/auth}"
      OIDC_TOKEN_ENDPOINT: "${OIDC_TOKEN_ENDPOINT:-http://keycloak:8081/realms/exelearning/protocol/openid-connect/token}"
      OIDC_USERINFO_ENDPOINT: ${OIDC_USERINFO_ENDPOINT:-http://keycloak:8081/realms/exelearning/protocol/openid-connect/userinfo}
      OIDC_SCOPE: "${OIDC_SCOPE:-openid email}"
      OIDC_CLIENT_ID: "${OIDC_CLIENT_ID:-exelearning}"
      OIDC_CLIENT_SECRET: "changeme"

      TEST_USER_EMAIL: "${TEST_USER_EMAIL:-user@exelearning.net}"
      TEST_USER_USERNAME: "${TEST_USER_USERNAME:-user}"
      TEST_USER_PASSWORD: "${TEST_USER_PASSWORD:-1234}"

      MERCURE_URL: "http://localhost:${APP_PORT:-8081}/.well-known/mercure"
      MERCURE_PUBLIC_URL:
      MERCURE_JWT_SECRET_KEY: "${MERCURE_JWT_SECRET_KEY:-!ChangeThisMercureHubJWTSecretKey!}"
      MERCURE_PUBLISHER_JWT_KEY: "${MERCURE_JWT_SECRET_KEY:-!ChangeThisMercureHubJWTSecretKey!}"
      MERCURE_SUBSCRIBER_JWT_KEY: "${MERCURE_JWT_SECRET_KEY:-!ChangeThisMercureHubJWTSecretKey!}"

      API_JWT_SECRET: "${API_JWT_SECRET:-ChangeThisAPISecretForINTEF}"

      POST_CONFIGURE_COMMANDS: |
        echo "Setting up eXeLearning with MariaDB and Keycloak..."
        php bin/console app:create-user ${TEST_USER_EMAIL:-user@exelearning.net} ${TEST_USER_PASSWORD:-1234} ${TEST_USER_USERNAME:-user} --no-fail

  exelearning-db:
    image: mariadb:12.1.2
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: "${MARIADB_ROOT_PASSWORD:-root}"
      MARIADB_DATABASE: "${DB_NAME:-exelearning}"
      MARIADB_USER: "${DB_USER:-exelearning}"
      MARIADB_PASSWORD: "${DB_PASSWORD:-exelearning}"
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - exelearning-db-data:/var/lib/mysql

  keycloak-db:
    image: mariadb:12.1.2
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: "${KEYCLOAK_DB_ROOT_PASSWORD:-root}"
      MARIADB_DATABASE: "${KEYCLOAK_DB_NAME:-keycloak}"
      MARIADB_USER: "${KEYCLOAK_DB_USER:-keycloak}"
      MARIADB_PASSWORD: "${KEYCLOAK_DB_PASSWORD:-keycloak}"
    volumes:
      - keycloak-db-data:/var/lib/mysql

  keycloak:
    image: quay.io/keycloak/keycloak:26.4.7
    restart: unless-stopped
    # Atention!! in a production environment the following line should be replaced by
    # command: ["start"]
    command: ["start-dev", "--import-realm"]
    depends_on:
      - keycloak-db
    environment:
      KEYCLOAK_ADMIN: "${KEYCLOAK_ADMIN:-admin}"
      KEYCLOAK_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD:-admin}"
      KC_DB: mariadb
      KC_DB_URL: "jdbc:mariadb://keycloak-db:3306/${KEYCLOAK_DB_NAME:-keycloak}"
      KC_DB_USERNAME: "${KEYCLOAK_DB_USER:-keycloak}"
      KC_DB_PASSWORD: "${KEYCLOAK_DB_PASSWORD:-keycloak}"
      KEYCLOAK_IMPORT:
      KEYCLOAK_LOGLEVEL: INFO
      KC_HOSTNAME: "${KEYCLOAK_HOSTNAME:-keycloak}"
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_PORT: 8081
    ports:
      - "${KEYCLOAK_PORT:-8081}:8081"
    volumes:
      - keycloak-data:/opt/keycloak/data
      # Attention: this mount should be removed in a production environment, since
      # the realms use to be defined at hand and depends on the given environment.
      - ./keycloak-realms:/opt/keycloak/data/import

volumes:
  exelearning-data:
  exelearning-db-data:
  keycloak-db-data:
  keycloak-data:
