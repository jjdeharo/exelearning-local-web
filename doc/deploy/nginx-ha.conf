# Nginx Load Balancer Configuration for eXeLearning HA
# This file should be placed alongside docker-compose.redis.yml
#
# Features:
# - Round-robin load balancing for HTTP requests
# - IP-hash for WebSocket connections (optional, Redis handles sync)
# - WebSocket upgrade handling for /yjs/*
# - Gzip compression
# - Health check endpoint

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format with upstream info
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" upstream=$upstream_addr';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml application/xml+rss text/javascript application/x-font-ttf
               font/opentype image/svg+xml;

    # Connection upgrade map for WebSocket
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Upstream configuration - round-robin by default
    # No sticky sessions needed - stateless JWT auth
    upstream exelearning_backend {
        # Least connections algorithm for better distribution
        least_conn;

        server exelearning-1:8080 max_fails=3 fail_timeout=30s;
        server exelearning-2:8080 max_fails=3 fail_timeout=30s;

        # Keep connections alive to backend
        keepalive 32;
    }

    # WebSocket upstream - uses same backend but with different settings
    upstream exelearning_websocket {
        # Use ip_hash for WebSocket to maintain connection to same backend
        # This reduces latency (though Redis sync makes it optional)
        ip_hash;

        server exelearning-1:8080 max_fails=3 fail_timeout=30s;
        server exelearning-2:8080 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;
        server_name _;

        # Health check endpoint for load balancer
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # WebSocket endpoint for Yjs collaboration
        location /yjs/ {
            proxy_pass http://exelearning_websocket;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket timeout settings (7 days)
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;

            # Disable buffering for WebSocket
            proxy_buffering off;
        }

        # API endpoints
        location /api/ {
            proxy_pass http://exelearning_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Timeouts for API calls
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Large file uploads (1GB)
            client_max_body_size 1024M;
        }

        # Static files and pages
        location / {
            proxy_pass http://exelearning_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Cache static assets
            proxy_cache_valid 200 1h;

            # Large file uploads (1GB)
            client_max_body_size 1024M;
        }
    }
}
