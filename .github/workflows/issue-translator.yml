name: issue-translator

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

# Minimal permissions: the action needs to create a comment on the issue.
permissions:
  issues: write
  contents: read

jobs:
  translate:
    runs-on: ubuntu-latest

    steps:
      # Translate non-English issues into English and post the translation as a new comment.
      # This action uses the built-in GITHUB_TOKEN to write the comment.
      - name: Translate issue to English
        uses: sircharlo/github-translate-action@v1.0.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Do not modify the issue title (keeps original title intact).
          IS_MODIFY_TITLE: false

          # When false, the action posts the translation as a new comment (recommended).
          # When true, it appends translation to the original content to reduce notifications.
          APPEND_TRANSLATION: false

          # Custom notice prepended to the translated content (shown in the comment).
          CUSTOM_BOT_NOTE: "Auto-translated to English."

          # Skip translating content created by these actors (useful to avoid bots).
          SKIP_ACTORS: 'dependabot[bot],renovate[bot],github-actions[bot]'

          # Do not translate content under these markdown headings.
          # Handy to keep logs, screenshots, or confirmations unchanged.
          SECTIONS_TO_SKIP: 'Confirmations,Screenshots,Relevant log output,Logs'
