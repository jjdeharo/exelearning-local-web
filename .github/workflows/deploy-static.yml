name: Deploy Static

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'doc/**'
      - 'test/**'
      - '*.md'
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed
    paths-ignore:
      - 'doc/**'
      - 'test/**'
      - '*.md'

permissions:
  contents: write
  pull-requests: write

jobs:
  # ============================================
  # Deploy from main → gh-pages root
  # ============================================
  deploy-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-gh-pages
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build static bundle
        run: VERSION=main bun run build:static

      - name: Deploy to GitHub Pages (Clean Root, Keep PRs)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ./dist/static
          branch: gh-pages
          clean: true
          clean-exclude: pr-preview
          force: false
          attempt-limit: 10
          commit-message: 'deploy: main nightly'


  # ============================================
  # Deploy from PRs → pr-preview/pr-{number}/
  # ============================================
  deploy-pr:

    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-gh-pages
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        if: github.event.action != 'closed'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        if: github.event.action != 'closed'
        run: bun install

      - name: Build static distribution
        if: github.event.action != 'closed'
        run: VERSION=pr${{ github.event.number }} bun run build:static

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./dist/static/
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
          qr-code: true
          pages-base-url: exelearning.dev
          wait-for-pages-deployment: false
