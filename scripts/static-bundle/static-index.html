    <!-- Static Mode Configuration -->
    <script>
        // Static mode flag
        window.__EXE_STATIC_MODE__ = true;

        // Pre-bundled API data (loaded on demand from bundle.json)
        window.__EXE_STATIC_DATA__ = null;

        // eXeLearning configuration
        window.__APP_ENV__ = "prod";
        window.__APP_DEBUG__ = "0";
        window.__APP_ONLINE_MODE__ = false;

        // Get saved locale from localStorage (returns null if not saved)
        function getSavedLocale() {
            try {
                const prefs = JSON.parse(localStorage.getItem('exe_user_preferences') || '{}');
                // UserPreferences saves as { userPreferences: { locale: { value: 'eu' } } }
                if (prefs.userPreferences?.locale?.value) return prefs.userPreferences.locale.value;
                // Also check flat format { locale: 'eu' } for backwards compatibility
                if (prefs.locale) return prefs.locale;
            } catch (e) {}
            return null; // No saved preference
        }

        // Get validated locale: saved > browser language (if available) > English
        function getValidatedLocale(availableLocales) {
            const saved = getSavedLocale();
            if (saved && availableLocales.includes(saved)) {
                return saved;
            }
            // Try browser language
            const browserLang = navigator.language?.split('-')[0];
            if (browserLang && availableLocales.includes(browserLang)) {
                return browserLang;
            }
            // Default to English
            return 'en';
        }

        // Preliminary locale (will be validated after bundle.json loads)
        function getPreliminaryLocale() {
            const saved = getSavedLocale();
            if (saved) return saved;
            return navigator.language?.split('-')[0] || 'en';
        }

        // UUID generation with fallback for non-secure contexts
        function generateUUID() {
            // Use crypto.randomUUID if available (secure contexts only)
            if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
                return crypto.randomUUID();
            }
            // Fallback using crypto.getRandomValues (works in all contexts)
            if (typeof crypto !== 'undefined' && typeof crypto.getRandomValues === 'function') {
                return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
                    (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16)
                );
            }
            // Last resort fallback using Math.random (not cryptographically secure)
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
                const r = Math.random() * 16 | 0;
                return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
            });
        }

        const STATIC_PROJECT_ID_SESSION_KEY = 'exe-static-project-id';
        const STATIC_RECOVER_PROJECT_ID_KEY = 'exe-static-recover-project-id';
        const STATIC_SKIP_RECOVERY_ON_RELOAD_KEY = 'exe-static-skip-recovery-on-reload';

        function persistStaticProjectId(projectId) {
            if (!projectId) return;
            try {
                sessionStorage.setItem(STATIC_PROJECT_ID_SESSION_KEY, projectId);
            } catch (e) {}
        }

        function clearRecoveredStaticProjectId() {
            try {
                localStorage.removeItem(STATIC_RECOVER_PROJECT_ID_KEY);
            } catch (e) {}
        }

        function markStaticTransitionSkipRecovery() {
            try {
                sessionStorage.setItem(STATIC_SKIP_RECOVERY_ON_RELOAD_KEY, 'true');
            } catch (e) {}
        }

        function clearStaticTransitionSkipRecovery() {
            try {
                sessionStorage.removeItem(STATIC_SKIP_RECOVERY_ON_RELOAD_KEY);
            } catch (e) {}
        }

        function resolveInitialStaticProjectId() {
            try {
                const sessionProjectId = sessionStorage.getItem(STATIC_PROJECT_ID_SESSION_KEY);
                if (sessionProjectId) {
                    return sessionProjectId;
                }
            } catch (e) {}

            try {
                const recoverProjectId = localStorage.getItem(STATIC_RECOVER_PROJECT_ID_KEY);
                if (recoverProjectId) {
                    persistStaticProjectId(recoverProjectId);
                    return recoverProjectId;
                }
            } catch (e) {}

            const projectId = generateUUID();
            persistStaticProjectId(projectId);
            return projectId;
        }

        const initialStaticProjectId = resolveInitialStaticProjectId();
        clearStaticTransitionSkipRecovery();

        window.eXeLearning = {
            version: "{{BUILD_VERSION}}",
            expires: "",
            extension: "elpx",
            user: JSON.stringify({
                id: 0,
                username: "guest",
                email: "guest@local",
                roles: ["ROLE_USER"]
            }),
            config: JSON.stringify({
                isOfflineInstallation: true,
                isStaticMode: true,
                locale: getSavedLocale(),
                basePath: '',
                baseURL: '.',
                fullURL: '.',
                yjsEnabled: true,
                userStyles: false,
                defaultTheme: 'base',
                themeBaseType: 'base',
                themeTypeBase: 'base',
                themeTypeUser: 'user',
                clientCallWaitingTime: 5000
            }),
            projectId: initialStaticProjectId  // Set synchronously so app.bundle.js can start
        };

        // MathJax configuration with relative paths for static mode
        // Must be defined BEFORE common.js loads to override version-based path detection
        var externalExtensions = [
            'amscd', 'bbox', 'boldsymbol', 'braket', 'bussproofs', 'cancel',
            'cases', 'centernot', 'color', 'colortbl', 'empheq', 'enclose',
            'extpfeil', 'gensymb', 'html', 'mathtools', 'mhchem', 'noerrors',
            'physics', 'tagformat', 'textcomp', 'unicode', 'upgreek', 'verb',
            'setoptions'
        ];
        window.MathJax = {
            tex: {
                inlineMath: [["\\(", "\\)"]],
                displayMath: [["$$", "$$"], ["\\[", "\\]"]],
                processEscapes: true,
                tags: 'ams',
                packages: { '[+]': externalExtensions }
            },
            loader: {
                paths: { mathjax: './app/common/exe_math' },
                load: externalExtensions.map(function(ext) { return '[tex]/' + ext; })
            },
            options: {
                // Exclude navbar dropdown menus from MathJax processing (File, Edit, etc.)
                // Note: nav-element is NOT excluded - page titles with LaTeX must be processed
                ignoreHtmlClass: 'tex2jax_ignore|dropdown-menu|dropdown-item|modal',
                // Skip processing inside these HTML tags
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
            }
        };
    </script>

    <!-- Static Mode Initialization -->
    <script>
        // Load static data bundle
        async function loadStaticData() {
            try {
                const response = await fetch('./data/bundle.json');
                window.__EXE_STATIC_DATA__ = await response.json();
                console.log('[Static] Loaded bundle.json');
            } catch (e) {
                console.error('[Static] Failed to load bundle.json:', e);
                window.__EXE_STATIC_DATA__ = {
                    parameters: { routes: {} },
                    translations: {},
                    idevices: { idevices: [] },
                    themes: { themes: [] }
                };
            }
        }

        // Initialize static mode - load bundle data and validate locale
        async function initStaticMode() {
            await loadStaticData();
            registerPwaFileOpenHandlers();

            // Validate and set locale after bundle.json is loaded
            const localeOptions = window.__EXE_STATIC_DATA__?.parameters?.userPreferencesConfig?.locale?.options;
            if (localeOptions) {
                const availableLocales = Object.keys(localeOptions);
                const validatedLocale = getValidatedLocale(availableLocales);

                // Update the config with validated locale
                // Note: config may be a string (before app.js runs) or object (after app.js parses it)
                if (typeof window.eXeLearning.config === 'string') {
                    const config = JSON.parse(window.eXeLearning.config);
                    config.locale = validatedLocale;
                    window.eXeLearning.config = JSON.stringify(config);
                } else if (typeof window.eXeLearning.config === 'object') {
                    window.eXeLearning.config.locale = validatedLocale;
                }

                console.log('[Static] Locale validated:', validatedLocale, '(browser:', navigator.language, ')');
            }

            // Check for ?url= parameter to auto-open a remote file
            await fetchUrlParam();

            // Setup File menu handlers after app bundle loads
            setTimeout(() => {
                setupFileMenuHandlers();
            }, 100);
        }

        // Show a URL import error on the loading screen and store it for deferred display.
        function showUrlError(message) {
            window.__exeStaticUrlError = message;
            const loadScreen = document.getElementById('load-screen-main');
            if (loadScreen) {
                const span = loadScreen.querySelector('span');
                if (span) span.textContent = message;
            }
        }

        // Fetch a remote file specified via ?url= query parameter.
        async function fetchUrlParam() {
            const urlParams = new URLSearchParams(window.location.search);
            const remoteUrl = urlParams.get('url');
            if (!remoteUrl) return;

            // Validate URL format
            let parsedUrl;
            try {
                parsedUrl = new URL(remoteUrl);
            } catch (e) {
                console.error('[Static] Invalid ?url= parameter:', remoteUrl);
                showUrlError('Invalid URL: ' + remoteUrl);
                return;
            }

            // Only allow http/https
            if (parsedUrl.protocol !== 'http:' && parsedUrl.protocol !== 'https:') {
                console.error('[Static] ?url= must use http or https:', remoteUrl);
                showUrlError('URL must use http:// or https://');
                return;
            }

            // Require a supported file extension
            const pathname = parsedUrl.pathname.toLowerCase();
            if (!pathname.endsWith('.elpx') && !pathname.endsWith('.elp') && !pathname.endsWith('.zip')) {
                console.error('[Static] ?url= file must be .elpx, .elp, or .zip:', remoteUrl);
                showUrlError('URL must point to an .elpx, .elp, or .zip file');
                return;
            }

            // Fetch the remote file
            console.log('[Static] Fetching remote file:', remoteUrl);
            try {
                const response = await fetch(remoteUrl);
                if (!response.ok) {
                    throw new Error('HTTP ' + response.status + ' ' + response.statusText);
                }
                const blob = await response.blob();
                const filename = parsedUrl.pathname.split('/').pop() || 'imported.elpx';
                const file = new File([blob], filename, { type: 'application/octet-stream' });

                console.log('[Static] Remote file fetched:', filename, file.size, 'bytes');
                routeIncomingStaticFile(file);
            } catch (e) {
                console.error('[Static] Failed to fetch ?url=:', e);
                showUrlError('Could not download file: ' + e.message);
                return;
            }

            // Clean ?url= from the address bar
            const newUrl = new URL(window.location);
            newUrl.searchParams.delete('url');
            const cleanUrl = newUrl.pathname + (newUrl.search || '');
            window.history.replaceState({}, '', cleanUrl);
        }

        // Route an incoming file (from PWA file handlers) to the app when ready.
        function routeIncomingStaticFile(file) {
            if (!(file instanceof File)) return;
            window.__pendingImportFile = file;

            // Ensure there is a projectId so app bootstrap can proceed.
            if (!window.eXeLearning.projectId) {
                window.eXeLearning.projectId = resolveInitialStaticProjectId();
            } else {
                persistStaticProjectId(window.eXeLearning.projectId);
            }

            const app = window.eXeLearning?.app;
            if (app && typeof app.openStaticFile === 'function') {
                app.openStaticFile(file);
                return;
            }

            if (typeof window.__startExeApp === 'function') {
                window.__startExeApp();
            }
        }

        // Handle OS-level "Open with PWA" file launches (manifest file_handlers).
        function registerPwaFileOpenHandlers() {
            if (!('launchQueue' in window) || typeof window.launchQueue.setConsumer !== 'function') {
                return;
            }

            window.launchQueue.setConsumer(async (launchParams) => {
                try {
                    const files = launchParams?.files || [];
                    if (!files.length) return;

                    for (const handle of files) {
                        if (!handle || typeof handle.getFile !== 'function') continue;
                        const file = await handle.getFile();
                        routeIncomingStaticFile(file);
                    }
                } catch (error) {
                    console.error('[Static/PWA] Failed to process launched file(s):', error);
                }
            });
        }

        // Setup File menu handlers for static mode
        function setupFileMenuHandlers() {
            // File > New is handled by navbarFile.js.
            // Avoid duplicate listeners here, which can cause current-tab reload
            // while opening a new tab on Cmd/Ctrl-click.

            // File > Open is handled by navbarFile.js openUserOdeFilesEvent()
            // which detects __EXE_STATIC_MODE__ and uses openFileInputStatic()

            // Populate Recent Projects menu
            populateRecentProjects();
        }

        // Populate recent projects submenu
        async function populateRecentProjects() {
            const recentMenu = document.getElementById('navbar-dropdown-menu-recent-projects');
            if (!recentMenu) return;

            if (window.indexedDB?.databases) {
                try {
                    const dbs = await window.indexedDB.databases();
                    const projects = dbs.filter(db => db.name?.startsWith('exelearning-project-'));

                    if (projects.length > 0) {
                        recentMenu.innerHTML = '';
                        for (const db of projects.slice(0, 10)) {
                            const uuid = db.name.replace('exelearning-project-', '');
                            const li = document.createElement('li');
                            li.innerHTML = `
                                <a class="dropdown-item" href="#" onclick="event.preventDefault(); openProject('${uuid}')">
                                    ${uuid.substring(0, 8)}...
                                </a>
                            `;
                            recentMenu.appendChild(li);
                        }
                    } else {
                        recentMenu.innerHTML = '<li class="dropdown-item text-muted" data-i18n="No recent projects...">No recent projects...</li>';
                    }
                } catch (e) {
                    console.log('[Static] Could not list IndexedDB databases');
                    recentMenu.innerHTML = '<li class="dropdown-item text-muted" data-i18n="No recent projects...">No recent projects...</li>';
                }
            }
        }

        // Create new blank project
        window.newProject = function() {
            const uuid = generateUUID();
            markStaticTransitionSkipRecovery();
            clearRecoveredStaticProjectId();
            persistStaticProjectId(uuid);
            window.eXeLearning.projectId = uuid;
            // Reload the page to start fresh
            location.reload();
        };

        // Open existing project from recent list
        window.openProject = async function(uuid) {
            markStaticTransitionSkipRecovery();
            persistStaticProjectId(uuid);
            window.eXeLearning.projectId = uuid;
            // Reload the page with the new project ID
            location.reload();
        };

        // Delete project
        window.deleteProject = async function(uuid) {
            if (confirm(typeof _ === 'function' ? _('Delete this project?') + ' ' + _('This action cannot be undone.') : 'Delete this project?')) {
                try {
                    await new Promise((resolve, reject) => {
                        const req = indexedDB.deleteDatabase('exelearning-project-' + uuid);
                        req.onsuccess = resolve;
                        req.onerror = reject;
                    });
                    await new Promise((resolve, reject) => {
                        const req = indexedDB.deleteDatabase('exelearning-assets-' + uuid);
                        req.onsuccess = resolve;
                        req.onerror = reject;
                    });
                    populateRecentProjects();
                } catch (e) {
                    console.error('Failed to delete project:', e);
                }
            }
        };

        // Start initialization
        initStaticMode();
    </script>

    <!-- Main Application Bundle -->
    <script src="./app/app.bundle.js?v={{BUILD_VERSION}}"></script>

    <!-- Register Service Worker for PWA (only when installed as standalone app) -->
    <script>
        if ('serviceWorker' in navigator) {
            // Only register SW when installed as PWA (standalone mode)
            const isPWA = window.matchMedia('(display-mode: standalone)').matches
                       || window.navigator.standalone === true;  // iOS Safari

            if (isPWA) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('./service-worker.js')
                        .then(reg => console.log('[PWA] Service worker registered'))
                        .catch(err => console.log('[PWA] Service worker registration failed:', err));
                });
            } else {
                // Unregister any existing SW when not in PWA mode
                navigator.serviceWorker.getRegistrations().then(regs => {
                    regs.forEach(reg => {
                        if (reg.active?.scriptURL.includes('service-worker.js')) {
                            reg.unregister();
                            console.log('[Static] Service worker unregistered (not in PWA mode)');
                        }
                    });
                });
            }
        }
    </script>
</body>
</html>
