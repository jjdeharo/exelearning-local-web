# config/services.yaml

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    # Compile the entire container into a single file
    .container.dumper.inline_factories: true

    auth_temp_email_domain_default: 'domain.local'
    base_path: '%env(string:BASE_PATH)%'
    assets.base_path: '%env(default::string:BASE_PATH)%/assets/%app.version%'

    app.online_mode: '%env(bool:APP_ONLINE_MODE)%'
    app.auth_methods: '%env(csv:APP_AUTH_METHODS)%'

    app.version: !php/const App\Constants::APP_VERSION
    app.expires: !php/const App\Constants::DEMO_EXPIRATION_DATE

    auth_create_users: '%env(bool:AUTH_CREATE_USERS)%'
    auth_temp_email_domain: '%env(default:auth_temp_email_domain_default:AUTH_TEMP_EMAIL_DOMAIN)%'

    cas_url: '%env(CAS_URL)%'
    cas_validate_path: '%env(CAS_VALIDATE_PATH)%'
    cas_login_path: '%env(CAS_LOGIN_PATH)%'
    cas_logout_path: '%env(CAS_LOGOUT_PATH)%'
    cas_validate_url: '%cas_url%%cas_validate_path%'
    cas_login_url: '%cas_url%%cas_login_path%'
    cas_logout_url: '%cas_url%%cas_logout_path%'

    oidc_issuer: '%env(OIDC_ISSUER)%'
    oidc_authorization_endpoint: '%env(OIDC_AUTHORIZATION_ENDPOINT)%'
    oidc_token_endpoint: '%env(OIDC_TOKEN_ENDPOINT)%'
    oidc_userinfo_endpoint: '%env(OIDC_USERINFO_ENDPOINT)%'
    oidc_scope: '%env(OIDC_SCOPE)%'
    oidc_client_id: '%env(OIDC_CLIENT_ID)%'
    oidc_client_secret: '%env(OIDC_CLIENT_SECRET)%'

    api_jwt_secret: '%env(string:API_JWT_SECRET)%'
    api_jwt_issuer: '%env(default::string:API_JWT_ISSUER)%'
    api_jwt_audience: '%env(default::string:API_JWT_AUDIENCE)%'

    filesdir: '%env(FILES_DIR)%'
    google_client_id: '%env(GOOGLE_CLIENT_ID)%'
    google_client_secret: '%env(GOOGLE_CLIENT_SECRET)%'
    dropbox_client_id: '%env(DROPBOX_CLIENT_ID)%'
    dropbox_client_secret: '%env(DROPBOX_CLIENT_SECRET)%'
    openequella_client_id: '%env(OPENEQUELLA_CLIENT_ID)%'
    openequella_client_secret: '%env(OPENEQUELLA_CLIENT_SECRET)%'

    mercure_url: '%env(MERCURE_URL)%'
    mercure_public_url: '%env(MERCURE_PUBLIC_URL)%'
    mercure_jwt_secret_key:  '%env(MERCURE_JWT_SECRET_KEY)%'

    security.firewall_name: 'main'

    # Default logs and cache directories
    logs_default_dir: '%kernel.logs_dir%'
    cache_default_dir: '%kernel.project_dir%/var/cache'

    # Read the LOG_DIR and CACHE_DIR env vars. If it does not exist, use the defaults.
    app.logs.dir:  '%env(default:logs_default_dir:LOG_DIR)%'
    app.cache.dir: '%env(default:cache_default_dir:CACHE_DIR)%'

    app.tmp_cleanup_key: '%env(string:TMP_CLEANUP_KEY)%'

    # Allow users to import/install styles
    app.online_themes_install: '%env(bool:ONLINE_THEMES_INSTALL)%'

    # Allow users to import/install iDevices
    app.online_idevices_install: '%env(bool:ONLINE_IDEVICES_INSTALL)%'

    # User storage and file upload limits
    app.user_storage_max_disk_space: '%env(int:USER_STORAGE_MAX_DISK_SPACE)%'
    app.count_user_autosave_space_ode_files: '%env(bool:COUNT_USER_AUTOSAVE_SPACE_ODE_FILES)%'
    app.file_upload_max_size: '%env(int:FILE_UPLOAD_MAX_SIZE)%'

    # Autosave configuration
    app.permanent_save_autosave_time_interval: '%env(int:PERMANENT_SAVE_AUTOSAVE_TIME_INTERVAL)%'
    app.permanent_save_autosave_max_number_of_files: '%env(int:PERMANENT_SAVE_AUTOSAVE_MAX_NUMBER_OF_FILES)%'
    app.autosave_ode_files_function: '%env(bool:AUTOSAVE_ODE_FILES_FUNCTION)%'

    # Application features
    app.version_control: '%env(bool:VERSION_CONTROL)%'
    app.user_recent_ode_files_amount: '%env(int:USER_RECENT_ODE_FILES_AMOUNT)%'
    app.collaborative_block_level: '%env(string:COLLABORATIVE_BLOCK_LEVEL)%'

services:
    Symfony\Component\DependencyInjection\ContainerInterface: '@service_container'
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
    Symfony\Component\Security\Core\Security: '@security.helper'

    App\Controller\:
        resource: '../src/Controller/'
        public: true
        tags: ['controller.service_arguments']


    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/Controller/'
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/ApiResource/'
            - '../src/Kernel.php'
            - '../src/var/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    # we add an extractor that allows us to process .js files
    App\Translation\net\exelearning\Translation\JsTranslationExtractor:
        arguments:
            $projectDir: '%kernel.project_dir%'
        tags:
            - { name: 'translation.extractor', alias: 'js' }

    App\Util\net\exelearning\Util\SettingsUtil:
        calls:
            - ['setContainer', ['@service_container']]


    # CAS Authentication
    security.access_token_extractor.cas:
        class: Symfony\Component\Security\Http\AccessToken\QueryAccessTokenExtractor
        arguments:
            - 'ticket'

    # Authorization: Bearer <token>
    security.access_token_extractor.header:
        class: Symfony\Component\Security\Http\AccessToken\HeaderAccessTokenExtractor
        arguments: ['Authorization', 'Bearer']

    # Query string ?access_token=...
    security.access_token_extractor.query_string:
        class: Symfony\Component\Security\Http\AccessToken\QueryAccessTokenExtractor
        arguments:
            - 'access_token'

    # We must define here the Cas2Handler to pass the $validationUrl to allow autowire
    'Symfony\Component\Security\Http\AccessToken\Cas\Cas2Handler':
        arguments:
            $validationUrl: '%cas_validate_url%'

    # OIDC Authentication

    # OIDC UserInfo Handler
    Symfony\Component\Security\Http\AccessToken\Oidc\OidcUserInfoTokenHandler:
        alias: security.access_token_handler.oidc_userinfo
        public: false

    # Scoped HTTP client bound to OIDC issuer, used for discovery
    http_client.oidc:
        class: Symfony\Contracts\HttpClient\HttpClientInterface
        factory: ['@http_client', 'withOptions']
        arguments:
            - { base_uri: '%oidc_issuer%' }

    security.access_token_handler.oidc_userinfo:
        class: Symfony\Component\Security\Http\AccessToken\Oidc\OidcUserInfoTokenHandler
        arguments:
            - '@http_client.oidc'
            - '@logger'
            - 'sub'
        calls:
            - [ enableDiscovery, ['@cache.app', 'security.oidc.discovery'] ]

    # MultiTokenHandler (combines OIDC, CAS, etc.)
    'App\Security\MultiTokenHandler':
        arguments:
            $casHandler: '@Symfony\Component\Security\Http\AccessToken\Cas\Cas2Handler'
            $oidcUserInfoHandler: '@security.access_token_handler.oidc_userinfo'
            $jwtHandler: '@App\Security\JwtTokenHandler'
            $authCreateUsers: '%auth_create_users%'
            $temporaryEmailDomain: '%auth_temp_email_domain%'
            $passwordHasherFactory: '@security.password_hasher_factory'
        tags: ['monolog.logger']

    'App\Security\JwtTokenHandler':
        arguments:
            $secretKey: '%api_jwt_secret%'
            $allowedAlgs: ['HS256']
            $issuer: '%api_jwt_issuer%'
            $audience: '%api_jwt_audience%'

    App\Controller\Api\AuthController:
        arguments:
            $jwtSecret: '%api_jwt_secret%'
            $jwtIssuer: '%api_jwt_issuer%'
            $jwtAudience: '%api_jwt_audience%'

    App\Command\GenerateJwtCommand:
        arguments:
            $secret: '%api_jwt_secret%'
            $issuer: '%api_jwt_issuer%'
            $audience: '%api_jwt_audience%'

    App\Command\ValidateJwtCommand:
        arguments:
            $secret: '%api_jwt_secret%'
            $issuer: '%api_jwt_issuer%'
            $audience: '%api_jwt_audience%'

    App\Service\net\exelearning\Service\Api\OdeService:
        arguments:
            $autosaveTimeInterval: '%app.permanent_save_autosave_time_interval%'
            $autosaveMaxFiles: '%app.permanent_save_autosave_max_number_of_files%'
            $countUserAutosaveSpace: '%app.count_user_autosave_space_ode_files%'

    App\Repository\net\exelearning\Repository\OdeFilesRepository:
        arguments:
            $userRecentOdeFilesAmount: '%app.user_recent_ode_files_amount%'
            $autosaveMaxFiles: '%app.permanent_save_autosave_max_number_of_files%'
        tags: ['doctrine.repository_service']

    # Register custom Doctrine repositories as services
    App\Entity\Project\ProjectPropertyRepository:
        autowire: true
        autoconfigure: true
        tags: ['doctrine.repository_service']

    # Restrict /api/v2/users collection for non-admins
    # Run AFTER built-in filters so we can neutralize them for non-admins
    App\Doctrine\Extension\UserCollectionExtension:
        tags:
            - { name: 'api_platform.doctrine.orm.query_extension.collection', priority: -999999 }

    App\Doctrine\Middleware\SqlitePragmaMiddleware:
        tags: ['doctrine.middleware']

    decorating_translator:
        class:     App\Translation\net\exelearning\Translation\Translator
        decorates: translator
        arguments:
            - '@.inner'

twig:
    globals:
        online_mode: '%app.online_mode%'
        auth_methods: '%app.auth_methods%'
        app_version: '%app.version%'
