<div id="food-web-g1-{{id}}" class="food-web-g1-container">
    <div class="food-web-header">
        <h2 class="food-web-title">{{title}}</h2>
        <h3 class="food-web-subtitle">{{subtitle}}</h3>
    </div>
    
    <div class="food-web-instructions">
        {{{instructions}}}
    </div>
    
    <div class="food-web-main">
        <div class="food-web-visualization">
            <!-- SVG or Canvas for the network will go here -->
            <div id="fw-network-{{id}}" class="fw-network"></div>
        </div>
        
        <div class="food-web-sidebar">
            <div id="fw-species-details-{{id}}" class="fw-species-details">
                <p class="placeholder-text">Select a species to see details.</p>
            </div>
            
            <div id="fw-legend-{{id}}" class="fw-legend">
                <!-- Legend for roles -->
            </div>
        </div>
    </div>
    
    <div class="food-web-activities">
        <div id="fw-questions-{{id}}" class="fw-questions">
            <!-- Questions will be rendered here -->
        </div>
        
        <div id="fw-scenarios-{{id}}" class="fw-scenarios">
            <!-- Scenarios will be rendered here -->
        </div>
    </div>
    
    <div class="food-web-feedback" id="fw-feedback-{{id}}" style="display:none">
    </div>
</div>
